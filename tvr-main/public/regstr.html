<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Книжный кокон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-screen">
        <div class="glass-card">
            <h1 class="title">Регистрация</h1>
            <p class="subtitle">Добро пожаловать в "Книжный кокон"!</p>
            <form id="register-form" class="auth-form">
                <input type="text" id="name" placeholder="Введите ваше имя" required>
                <input type="email" id="email" placeholder="Оставьте вашу электронную почту" required>
                <input type="password" id="password" placeholder="Придумайте пароль" required>
                <button type="submit" class="btn-primary">Создать аккаунт</button>
            </form>
            
            <div id="message"></div>
            
            <p class="form-footer">Уже есть аккаунт? <a href="auth.html">Войти</a></p>
        </div>
    </main>
    
    <!-- ✅ Подключаем JavaScript -->
    <script src="regstr.js"></script>
</body>
</html>
